<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
@font-face {
  font-family: 'MontserratCustom';
  src: url('./fonts/Montserrat-Regular.ttf') format('truetype');
  font-weight: 400;
}

@font-face {
  font-family: 'MontserratCustom';
  src: url('./fonts/Montserrat-SemiBold.ttf') format('truetype');
  font-weight: 600;
}

html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
}

.heading-part {
  width: 100%;
  margin: 0;
  padding: 0;
  text-align: center;
  line-height: 1;
}

.title {
  font-family: 'MontserratCustom', sans-serif;
  font-size: 42px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #333333;
  line-height: 1;
  margin: 0 0 6px 0;
  padding: 0;
}

.underline-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
}

.underline {
  width: 100%;
  height: 2px;
  background: #333333;
  transform: scaleX(0);
  transform-origin: center;
  animation: lineGrow 0.9s ease-out forwards;
}

@keyframes lineGrow {
  from {
    transform: scaleX(0);
  }
  to {
    transform: scaleX(1);
  }
}
</style>
</head>

<body>
  <div class="heading-part">
    <div class="title">NEWS</div>
    <div class="underline-wrap">
      <div class="underline"></div>
    </div>
  </div>
</body>
</html>
